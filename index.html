<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Leave Tracker</title>  
<!-- Tailwind CSS & Config -->
<script src="https://cdn.tailwindcss.com"></script>
</head>
  <body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 min-h-screen relative">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          telus: {
            purple: '#4B286D',
            green: '#66CC00'
          }
        }
      }
    }
  }
</script>


  <!-- Background Koala Image -->
  <div class="fixed inset-0 z-[-1] opacity-50 bg-cover bg-center pointer-events-none"
       style="background-image: url('https://images.unsplash.com/photo-1548679847-36e2978a3f5a?auto=format&fit=crop&w=1920&q=80');">
  </div>

  <!-- Global Theme Toggle -->
  <div class="fixed top-4 right-4 z-50">
    <button onclick="toggleTheme()" class="p-2 rounded-full bg-white/80 dark:bg-gray-800/80 backdrop-blur text-gray-800 dark:text-gray-200 shadow-md transition hover:scale-105">
      <span id="theme-icon">🌙</span>
    </button>
  </div>

  <!-- ========================================== -->
  <!-- MODAL POPUP (Hidden by default)            -->
  <!-- ========================================== -->
  <div id="request-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300" id="modal-content-box">
      <!-- Modal Header -->
      <div class="bg-gray-50 dark:bg-gray-900/50 px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white flex items-center"><span class="mr-2">📄</span> Request Details</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <!-- Modal Body (Injected via JS) -->
      <div id="modal-body" class="p-6 space-y-4">
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 1. LOGIN SCREEN                            -->
  <!-- ========================================== -->
  <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="text-center mb-8 bg-white/70 dark:bg-gray-900/70 p-6 rounded-2xl backdrop-blur-md shadow-sm border border-white/20 dark:border-gray-700/50">
      <div class="flex items-center justify-center mb-2">
        <span class="text-4xl font-bold tracking-tighter text-telus-purple dark:text-white">TELUS</span>
        <svg class="w-8 h-8 ml-1 text-telus-green" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
      </div>
      <h1 class="text-xl font-semibold text-gray-800 dark:text-gray-200">Team Leave Tracker</h1>
    </div>

    <div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-200/50 dark:border-gray-700/50">
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
          <input type="text" id="username" class="w-full border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-telus-purple focus:outline-none transition" placeholder="User or Admin">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
          <input type="password" id="password" class="w-full border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-900/50 text-gray-900 dark:text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-telus-purple focus:outline-none transition" placeholder="••••">
        </div>
        <button onclick="handleLogin()" class="w-full bg-telus-purple hover:bg-opacity-90 text-white font-medium py-3 rounded-lg transition shadow-md mt-2">Login to Portal</button>
        <p id="login-error" class="text-red-600 dark:text-red-400 text-sm text-center hidden mt-2 bg-red-50 dark:bg-red-900/30 p-2 rounded-md font-medium">Invalid credentials.</p>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 2. EMPLOYEE SCREEN                         -->
  <!-- ========================================== -->
  <div id="employee-screen" class="hidden flex flex-col min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8 w-full flex-grow">
     
      <!-- Navbar -->
      <div class="flex justify-between items-center mb-8 bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl backdrop-blur-md shadow-sm border border-gray-200/50 dark:border-gray-700/50">
        <div class="flex items-center">
          <span class="text-2xl font-bold tracking-tighter text-telus-purple dark:text-white mr-3">TELUS</span>
          <h1 class="text-xl font-medium text-gray-800 dark:text-gray-200 border-l-2 border-telus-green pl-3">Employee Dashboard</h1>
        </div>
        <button onclick="logout()" class="text-sm font-semibold text-telus-purple dark:text-telus-green hover:underline">Logout</button>
      </div>

      <!-- User Selector -->
      <div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md p-6 rounded-xl shadow-sm mb-8 border border-gray-200/50 dark:border-gray-700/50">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Select your profile to continue:</label>
        <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
          <select id="employee-selector" class="flex-1 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-telus-purple focus:outline-none font-medium">
            <option value="Aya Boubnane">Aya Boubnane</option>
            <option value="Aya Essakhi">Aya Essakhi</option>
            <option value="Ayman Elmahjoubi">Ayman Elmahjoubi</option>
            <option value="Elaydi Fathi">Elaydi Fathi</option>
            <option value="Joel Antoine Padonou">Joel Antoine Padonou</option>
            <option value="Kenza Redouane">Kenza Redouane</option>
            <option value="Youssef Ed.Diry">Youssef Ed.Diry</option>
            <option value="Zakaria Regab">Zakaria Regab</option>
            <option value="Zineb Bouzit">Zineb Bouzit</option>
          </select>
          <button onclick="renderEmployeeDashboard()" class="bg-telus-purple hover:bg-opacity-90 text-white px-6 py-2.5 rounded-lg font-medium transition shadow-md">Load My Data</button>
        </div>
      </div>

      <!-- Main Content Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md p-6 rounded-xl shadow-sm border border-gray-200/50 dark:border-gray-700/50">
          <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-5 flex items-center"><span class="mr-2">✈️</span> Submit a Request</h2>
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Start Date</label>
                <input type="date" id="start-date" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-telus-purple">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">End Date</label>
                <input type="date" id="end-date" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-telus-purple">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Leave Type</label>
              <select id="leave-type" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-telus-purple">
                <option>Paid vacation</option>
                <option>Unpaid vacation</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Reason (Optional)</label>
              <textarea id="leave-reason" rows="2" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-telus-purple" placeholder="Type your reason here..."></textarea>
            </div>
            <button onclick="submitRequest()" class="w-full bg-telus-green hover:bg-opacity-90 text-white font-semibold py-3 rounded-lg transition mt-4 shadow-md">Submit Request</button>
          </div>
        </div>
       
        <div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md p-6 rounded-xl shadow-sm border border-gray-200/50 dark:border-gray-700/50">
          <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-5 flex items-center"><span class="mr-2">📋</span> My Requests History</h2>
          <div id="my-requests-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 3. ADMIN SCREEN                            -->
  <!-- ========================================== -->
  <div id="admin-screen" class="hidden flex flex-col min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow">
     
      <!-- Navbar -->
      <div class="flex justify-between items-center mb-8 bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl backdrop-blur-md shadow-sm border border-gray-200/50 dark:border-gray-700/50">
        <div class="flex items-center">
          <span class="text-2xl font-bold tracking-tighter text-telus-purple dark:text-white mr-3">TELUS</span>
          <h1 class="text-xl font-medium text-gray-800 dark:text-gray-200 border-l-2 border-telus-green pl-3">Manager Portal</h1>
        </div>
        <button onclick="logout()" class="text-sm font-semibold text-telus-purple dark:text-telus-green hover:underline">Logout</button>
      </div>

      <!-- Advanced Calendar View -->
      <div class="bg-white/95 dark:bg-gray-800/95 backdrop-blur-md p-6 rounded-xl shadow-lg border border-gray-200/50 dark:border-gray-700/50 mb-8">
       
        <!-- View Controls -->
        <div class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4">
          <div class="flex space-x-2 bg-gray-100 dark:bg-gray-900 p-1.5 rounded-lg shadow-inner">
            <button onclick="setCalendarView('week')" id="btn-view-week" class="px-4 py-1.5 rounded-md font-medium text-sm transition">Weekly</button>
            <button onclick="setCalendarView('month')" id="btn-view-month" class="px-4 py-1.5 rounded-md font-medium text-sm transition">Monthly</button>
            <button onclick="setCalendarView('year')" id="btn-view-year" class="px-4 py-1.5 rounded-md font-medium text-sm transition">Yearly</button>
          </div>
         
          <div class="flex space-x-4 items-center bg-gray-100 dark:bg-gray-900 p-1.5 rounded-lg shadow-inner">
            <button onclick="navigateCalendar(-1)" class="px-3 py-1.5 bg-white dark:bg-gray-700 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 transition text-gray-800 dark:text-white shadow-sm font-medium">&larr; Prev</button>
            <span id="calendar-title" class="font-bold text-lg text-telus-purple dark:text-telus-green min-w-[180px] text-center">...</span>
            <button onclick="navigateCalendar(1)" class="px-3 py-1.5 bg-white dark:bg-gray-700 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 transition text-gray-800 dark:text-white shadow-sm font-medium">Next &rarr;</button>
          </div>
        </div>
       
        <!-- Dynamic Calendar Container -->
        <div id="calendar-container" class="w-full border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden bg-white dark:bg-gray-800">
          <!-- JS injects the specific view here -->
        </div>

        <!-- Legend -->
        <div class="mt-5 flex flex-wrap gap-4 text-xs font-medium text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-900/50 p-3 rounded-lg">
          <span class="flex items-center"><span class="w-3.5 h-3.5 bg-green-200 dark:bg-green-800 rounded-sm inline-block mr-2 border border-green-300 dark:border-green-600"></span> Approved</span>
          <span class="flex items-center"><span class="w-3.5 h-3.5 bg-yellow-200 dark:bg-yellow-800 rounded-sm inline-block mr-2 border border-yellow-300 dark:border-yellow-600"></span> Pending</span>
          <span class="flex items-center ml-auto text-gray-500 dark:text-gray-400 italic">Unmarked / Rejected days = Employee is working</span>
        </div>
      </div>

      <!-- Pending Requests List -->
      <div class="bg-white/95 dark:bg-gray-800/95 backdrop-blur-md p-6 rounded-xl shadow-lg border border-gray-200/50 dark:border-gray-700/50 mb-8">
        <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-5 border-b border-gray-200 dark:border-gray-700 pb-3">Action Required: Pending Requests</h2>
        <div id="pending-requests-list" class="space-y-4"></div>
      </div>
    </div>
  </div>

</body>

</html>
